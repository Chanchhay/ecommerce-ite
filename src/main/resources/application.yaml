spring:
  application:
    name: ite-3rd-ecommerce
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${URL}
    username: ${USERNAME}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
server:
  port: 9999

file:
  client-path: file
  storage-location: /home/chanchhay/Pictures/ite-file-upload/
  base-uri: http://localhost:${server.port}/${file.client-path}